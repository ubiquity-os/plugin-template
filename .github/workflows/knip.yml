name: Knip

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "20"
        type: string
      package-manager:
        description: "Package manager (bun, yarn, npm)"
        required: false
        default: "bun"
        type: string
      working-directory:
        description: "Working directory"
        required: false
        default: "."
        type: string

jobs:
  run-knip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        if: inputs.package-manager == 'bun' || (inputs.package-manager == '' && github.event_name != 'workflow_call')
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        if: inputs.package-manager != 'bun'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager == 'yarn' && 'yarn' || inputs.package-manager == 'npm' && 'npm' || '' }}

      - name: Install toolchain (bun)
        if: inputs.package-manager == 'bun' || (inputs.package-manager == '' && github.event_name != 'workflow_call')
        working-directory: ${{ inputs.working-directory }}
        run: bun install

      - name: Install toolchain (npm)
        if: inputs.package-manager == 'npm'
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Install toolchain (yarn)
        if: inputs.package-manager == 'yarn'
        working-directory: ${{ inputs.working-directory }}
        run: yarn install --frozen-lockfile

      - name: Store PR number
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.number }} > pr-number.txt

      - name: Run Knip
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ "${{ inputs.package-manager }}" = "bun" ] || [ "${{ inputs.package-manager }}" = "" ]; then
            bun run knip || bun run knip --reporter json > knip-results.json
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn knip || yarn knip --reporter json > knip-results.json
          else
            npm run knip || npm run knip -- --reporter json > knip-results.json
          fi

      - name: Upload knip result
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knip-results
          path: |
            knip-results.json
            pr-number.txt
